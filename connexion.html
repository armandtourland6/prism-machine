<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function(){
  try{
    var t = localStorage.getItem('prism-theme');
    if(!t){ t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
    document.documentElement.setAttribute('data-theme', t);
  }catch(e){}
})();
</script>
<title>Connexion — PRISM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@300;400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#fafaf8;--ink:#111110;--muted:#999994;--faint:#e8e8e4;--purple:#845ef7}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:'Instrument Sans',sans-serif;font-weight:300;line-height:1.6;min-height:100vh}

  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.4rem 3rem;background:rgba(250,250,248,0.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--faint)}
  .nav-logo{display:flex;align-items:center;text-decoration:none}
  .nav-back{font-size:0.75rem;color:var(--muted);text-decoration:none;letter-spacing:0.06em;border-bottom:1px solid var(--faint);padding-bottom:1px;transition:color 0.2s}
  .nav-back:hover{color:var(--ink);border-color:var(--ink)}

  .page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:9rem 1.5rem 4rem}
  .auth-wrap{width:100%;max-width:420px;border:1px solid var(--faint);padding:2.5rem}

  .tabs{display:flex;border:1px solid var(--faint);margin-bottom:2rem}
  .tab{flex:1;text-align:center;padding:0.85rem;font-size:0.8rem;letter-spacing:0.05em;cursor:pointer;color:var(--muted);border-right:1px solid var(--faint);transition:background-color .2s,color .2s}
  .tab:last-child{border-right:none}
  .tab.active{background:var(--ink);color:var(--bg)}

  .auth-title{font-family:'Instrument Serif',serif;font-size:1.6rem;font-style:italic;font-weight:400;margin-bottom:0.5rem}
  .auth-desc{font-size:0.8rem;color:var(--muted);margin-bottom:1.75rem;line-height:1.6}

  .field{margin-bottom:1.25rem}
  .field label{display:block;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem}
  .field input{width:100%;padding:0.8rem 0.9rem;border:1px solid var(--faint);background:transparent;color:var(--ink);font-family:'Instrument Sans',sans-serif;font-size:0.9rem;border-radius:10px}
  .field input:focus{outline:none;border-color:var(--ink)}

  .auth-btn{width:100%;background:var(--ink);color:var(--bg);padding:1rem;font-size:0.85rem;font-weight:400;letter-spacing:0.08em;border:none;cursor:pointer;border-radius:12px;font-family:'Instrument Sans',sans-serif;transition:opacity .2s, transform .2s;margin-top:0.5rem}
  .auth-btn:hover{opacity:0.85;transform:translateY(-2px)}
  .auth-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}

  .msg{font-size:0.78rem;padding:0.85rem 1rem;border-radius:10px;margin-bottom:1.25rem;display:none}
  .msg.show{display:block}
  .msg.error{background:rgba(255,107,107,0.12);color:#c92a2a}
  .msg.success{background:rgba(81,207,102,0.12);color:#2f9e44}

  .form-panel{display:none}
  .form-panel.active{display:block}

  .theme-toggle{
    width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:color-mix(in srgb, var(--bg) 45%, transparent);border:1px solid color-mix(in srgb, var(--ink) 12%, transparent);
    -webkit-backdrop-filter:blur(14px) saturate(1.6);backdrop-filter:blur(14px) saturate(1.6);
    color:var(--ink);cursor:pointer;flex-shrink:0;margin-left:1.25rem;-webkit-tap-highlight-color:transparent;
  }
  .theme-toggle:hover{transform:scale(1.07)}
  .theme-toggle .icon-moon{display:none}
  [data-theme="dark"] .theme-toggle .icon-sun{display:none}
  [data-theme="dark"] .theme-toggle .icon-moon{display:block}

  [data-theme="dark"]{--bg:#0c0c0d;--ink:#f1f1ec;--muted:#93938d;--faint:#29292b}
  html,body{transition:background-color .4s ease,color .4s ease}
  nav{
    background:color-mix(in srgb, var(--bg) 65%, transparent) !important;
    -webkit-backdrop-filter:blur(22px) saturate(1.6);backdrop-filter:blur(22px) saturate(1.6);
    border:1px solid color-mix(in srgb, var(--ink) 8%, transparent) !important;
    top:0.85rem;left:1.25rem;right:1.25rem;border-radius:18px;
    box-shadow:0 8px 30px color-mix(in srgb, var(--ink) 8%, transparent);
  }
  .auth-wrap{border-radius:20px;background:color-mix(in srgb, var(--bg) 55%, transparent);-webkit-backdrop-filter:blur(18px) saturate(1.4);backdrop-filter:blur(18px) saturate(1.4);box-shadow:0 10px 40px color-mix(in srgb, var(--ink) 6%, transparent)}

  .reveal{opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .8s cubic-bezier(.22,1,.36,1)}
  .reveal.in{opacity:1;transform:translateY(0)}

  @media (max-width:768px){
    nav{padding:1rem 1.5rem;top:0.5rem;left:0.6rem;right:0.6rem;border-radius:16px}
    .theme-toggle{width:40px;height:40px;margin-left:0.6rem}
    .auth-wrap{padding:2rem 1.5rem}
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <svg viewBox="0 0 115 24" height="18">
      <g stroke="var(--ink)" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12,1 2,23 22,23" stroke-width="1.6"/>
        <line x1="12" y1="1" x2="12" y2="23" stroke-width="1"/>
        <line x1="6" y1="14" x2="18" y2="14" stroke-width="1"/>
        <line x1="2" y1="23" x2="18" y2="14" stroke-width="1"/>
        <line x1="22" y1="23" x2="6" y2="14" stroke-width="1"/>
      </g>
      <text x="30" y="17" font-family="-apple-system,sans-serif" font-size="14" font-weight="600" fill="var(--ink)" letter-spacing="2">PRISM</text>
    </svg>
  </a>
  <a href="index.html" class="nav-back">← Accueil</a>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Basculer mode sombre / clair" title="Mode sombre / clair">
    <svg class="icon-sun" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><line x1="12" y1="1.5" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22.5"/><line x1="3.5" y1="12" x2="1" y2="12"/><line x1="23" y1="12" x2="20.5" y2="12"/><line x1="5" y1="5" x2="6.8" y2="6.8"/><line x1="17.2" y1="17.2" x2="19" y2="19"/><line x1="19" y1="5" x2="17.2" y2="6.8"/><line x1="6.8" y1="17.2" x2="5" y2="19"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5Z"/></svg>
  </button>
</nav>

<div class="page">
  <div class="auth-wrap reveal">
    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="switchTab('login')">Se connecter</div>
      <div class="tab" id="tabSignup" onclick="switchTab('signup')">Créer un compte</div>
    </div>

    <div class="msg" id="authMsg"></div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panelLogin">
      <div class="auth-title">Content de vous revoir.</div>
      <p class="auth-desc">Connectez-vous pour suivre votre commande et gérer votre profil.</p>
      <form id="loginForm">
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" required autocomplete="email">
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="password" id="loginPassword" required autocomplete="current-password">
        </div>
        <button type="submit" class="auth-btn" id="loginBtn">Se connecter</button>
      </form>
    </div>

    <!-- SIGNUP -->
    <div class="form-panel" id="panelSignup">
      <div class="auth-title">Bienvenue chez PRISM.</div>
      <p class="auth-desc">Créez votre compte pour suivre la fabrication de votre machine.</p>
      <form id="signupForm">
        <div class="field">
          <label>Nom complet</label>
          <input type="text" id="signupName" required autocomplete="name">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="signupEmail" required autocomplete="email">
        </div>
        <div class="field">
          <label>Mot de passe</label>
          <input type="password" id="signupPassword" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="auth-btn" id="signupBtn">Créer mon compte</button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  function toggleTheme(){
    var root = document.documentElement;
    var next = (root.getAttribute('data-theme') === 'dark') ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    try{ localStorage.setItem('prism-theme', next); }catch(e){}
  }

  function switchTab(which){
    document.getElementById('tabLogin').classList.toggle('active', which === 'login');
    document.getElementById('tabSignup').classList.toggle('active', which === 'signup');
    document.getElementById('panelLogin').classList.toggle('active', which === 'login');
    document.getElementById('panelSignup').classList.toggle('active', which === 'signup');
    hideMsg();
  }

  function showMsg(text, type){
    var el = document.getElementById('authMsg');
    el.textContent = text;
    el.className = 'msg show ' + type;
  }
  function hideMsg(){
    document.getElementById('authMsg').className = 'msg';
  }

  // Redirige vers le compte si déjà connecté
  (async function(){
    try{
      const { data } = await supabaseClient.auth.getSession();
      if(data && data.session){ window.location.href = 'compte.html'; }
    }catch(e){}
  })();

  document.getElementById('loginForm').addEventListener('submit', async function(e){
    e.preventDefault();
    hideMsg();
    var btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Connexion…';
    var email = document.getElementById('loginEmail').value.trim();
    var password = document.getElementById('loginPassword').value;
    try{
      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if(error){ showMsg(error.message === 'Invalid login credentials' ? 'Email ou mot de passe incorrect.' : error.message, 'error'); btn.disabled=false; btn.textContent='Se connecter'; return; }
      window.location.href = 'compte.html';
    }catch(err){
      showMsg('Impossible de se connecter. Vérifiez la configuration Supabase.', 'error');
      btn.disabled = false; btn.textContent = 'Se connecter';
    }
  });

  document.getElementById('signupForm').addEventListener('submit', async function(e){
    e.preventDefault();
    hideMsg();
    var btn = document.getElementById('signupBtn');
    btn.disabled = true; btn.textContent = 'Création…';
    var name = document.getElementById('signupName').value.trim();
    var email = document.getElementById('signupEmail').value.trim();
    var password = document.getElementById('signupPassword').value;
    try{
      const { data, error } = await supabaseClient.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });
      if(error){ showMsg(error.message, 'error'); btn.disabled=false; btn.textContent='Créer mon compte'; return; }
      if(data.session){
        window.location.href = 'compte.html';
      } else {
        showMsg('Compte créé ! Vérifiez vos emails pour confirmer votre adresse avant de vous connecter.', 'success');
        btn.disabled = false; btn.textContent = 'Créer mon compte';
      }
    }catch(err){
      showMsg('Impossible de créer le compte. Vérifiez la configuration Supabase.', 'error');
      btn.disabled = false; btn.textContent = 'Créer mon compte';
    }
  });

  // Reveal
  (function(){
    var els = document.querySelectorAll('.reveal');
    if(!('IntersectionObserver' in window)){ els.forEach(function(el){ el.classList.add('in'); }); return; }
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
    }, {threshold:0.1});
    els.forEach(function(el){ io.observe(el); });
  })();
</script>

</body>
</html>
